version: '3.8'

services:
  # ----------------------------------------
  # Core Databases
  # ----------------------------------------
  mongodb:
    image: mongo:latest
    container_name: aetherbase-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-securepassword123}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - aether-network

  redis:
    image: redis:alpine
    container_name: aetherbase-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aether-network

  # ----------------------------------------
  # API Backend (Fastify)
  # ----------------------------------------
  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    container_name: aetherbase-api
    restart: always
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-securepassword123}@mongodb:27017/aetherbase?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super-secret-production-key}
      - CORS_ORIGIN=https://dashboard.aetherbase.com
      - STORAGE_PATH=/app/uploads
    ports:
      - "3001:3001"
    volumes:
      - aether_storage:/app/uploads
    networks:
      - aether-network

  # ----------------------------------------
  # Dashboard Frontend (Next.js)
  # ----------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: aetherbase-dashboard
    restart: always
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=https://api.aetherbase.com
    ports:
      - "3000:3000"
    networks:
      - aether-network

  # ----------------------------------------
  # Nginx Reverse Proxy
  # ----------------------------------------
  nginx:
    image: nginx:latest
    container_name: aetherbase-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - aether_storage:/var/www/aetherbase/uploads:ro
    depends_on:
      - api
      - dashboard
    networks:
      - aether-network

networks:
  aether-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  aether_storage:
